<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Thy Word Media — discover and explore media from independent Christian content creators. Browse by category, age range, and more.">
  <meta name="keywords" content="independent authors, books, children's books, self-published, book gallery, buy books">
  <meta property="og:title" content="Thy Word Media">
  <meta property="og:description" content="Discover media from independent Christian content creators — browse, search, and explore a growing collection.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Thy Word Media">
  <meta name="twitter:description" content="Discover media from independent Christian content creators — browse, search, and explore a growing collection.">
  <link rel="canonical" href="index.html">
  <title>Thy Word Media</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <h1>Thy Word Media</h1>
      <p class="tagline">Discover media from independent Christian content creators</p>
      <nav class="site-nav" aria-label="Site navigation">
        <a href="index.html" class="nav-link" aria-current="page">Books</a>
        <a href="contributors.html" class="nav-link">Contributors</a>
        <a href="about.html" class="nav-link">About</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="controls">
      <input type="search" id="search-input" placeholder="Search by title or author…" aria-label="Search books">
      <select id="category-filter" aria-label="Filter by category">
        <option value="">All Categories</option>
      </select>
      <select id="age-filter" aria-label="Filter by age range">
        <option value="">All Ages</option>
      </select>
      <select id="sort-order" aria-label="Sort order">
        <option value="random" selected>Random</option>
        <option value="newest">Most Recent First</option>
        <option value="oldest">Oldest First</option>
        <option value="title">Title A–Z</option>
        <option value="author">Author A–Z</option>
      </select>
    </div>

    <p id="status-bar"></p>
    <div id="books-grid" class="books-grid" role="list"></div>
  </main>

  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-content">
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <footer>
    <p>&copy; <span id="footer-year"></span> Thy Word Media</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
