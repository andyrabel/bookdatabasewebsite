  <line x1="6" y1="15" x2="13" y2="15" stroke="#e8d5b0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="6" y1="19" x2="13" y2="19" stroke="#e8d5b0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- right page lines -->
  <line x1="19" y1="11" x2="26" y2="11" stroke="#c8e6c9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="15" x2="26" y2="15" stroke="#c8e6c9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="19" x2="26" y2="19" stroke="#c8e6c9" stroke-width="1.5" stroke-linecap="round"/>
